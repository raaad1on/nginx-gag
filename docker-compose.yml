version: '3.8'

services:
  security-gateway:
    build: .
    container_name: nginx-gag
    environment:
      - DOMAIN=${DOMAIN:-example.com}
    volumes:
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    ports:
      - "127.0.0.1:444:444"
      - "127.0.0.1:9000:9000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - nginx-gag-network

networks:
  nginx-gag-network:
    driver: bridge